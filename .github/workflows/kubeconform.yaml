---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Kubeconform"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - "kubernetes/**"

env:
  MAIN_CLUSTER_KUBERNETES_DIR: ./kubernetes/main

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@6315ef70a8bfcd2c71104383846591ac113ace33 # main

      - name: Setup Workflow Tools
        env:
          HOMEBREW_NO_SANDBOX_LINUX: "1"
        run: brew install fluxcd/tap/flux kubeconform kustomize

      - name: Run kubeconform for main cluster
        shell: bash
        run: bash ./scripts/kubeconform.sh ${{ env.MAIN_CLUSTER_KUBERNETES_DIR }}
