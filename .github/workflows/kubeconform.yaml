---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Kubeconform"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - "kubernetes/**"

env:
  MAIN_CLUSTER_KUBERNETES_DIR: ./kubernetes/main

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # main

      - name: Setup Workflow Tools
        env:
          HOMEBREW_NO_SANDBOX_LINUX: "1"
        run: brew install fluxcd/tap/flux kubeconform kustomize

      - name: Run kubeconform for main cluster
        shell: bash
        run: bash ./scripts/kubeconform.sh ${{ env.MAIN_CLUSTER_KUBERNETES_DIR }}
