---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Kubeconform"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - "kubernetes/**"

env:
  MAIN_CLUSTER_KUBERNETES_DIR: ./kubernetes/main

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@d4a9d3894e99dfb50a41c089a3dfcbd6009152a1 # main

      - name: Setup Workflow Tools
        env:
          HOMEBREW_NO_SANDBOX_LINUX: "1"
        run: brew install fluxcd/tap/flux kubeconform kustomize

      - name: Run kubeconform for main cluster
        shell: bash
        run: bash ./scripts/kubeconform.sh ${{ env.MAIN_CLUSTER_KUBERNETES_DIR }}
