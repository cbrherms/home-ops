---
# Area
area/bootstrap:
  - changed-files:
      - any-glob-to-any-file: bootstrap/**/*
area/github:
  - changed-files:
      - any-glob-to-any-file: .github/**/*
area/kubernetes:
  - changed-files:
      - any-glob-to-any-file: kubernetes/**/*
area/justfile:
  - changed-files:
      - any-glob-to-any-file: .justfile
      - any-glob-to-any-file: .justfiles/**/*
      - any-glob-to-any-file: *.just

# Cluster
cluster/main:
  - changed-files:
      - any-glob-to-any-file: kubernetes/main/**/*
