---
# Area
area/bootstrap:
  - changed-files:
      - any-glob-to-any-file: 'bootstrap/**/*'

area/github:
  - changed-files:
      - any-glob-to-any-file: '.github/**/*'

area/kubernetes:
  - changed-files:
      - any-glob-to-any-file: 'kubernetes/**/*'

area/mise:
  - changed-files:
      - any-glob-to-any-file:
          - '.mise.toml'

area/justfile:
  - changed-files:
      - any-glob-to-any-file:
          - '.justfile'
          - '.justfiles/**/*'
          - '**/*.just'

# Cluster
cluster/main:
  - changed-files:
      - any-glob-to-any-file: 'kubernetes/main/**/*'
